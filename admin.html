<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Profesor</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <style>
        body {
            padding: var(--space-xl);
            background-color: var(--bg-base);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl);
        }
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-lg);
        }
        .card-scrollable {
            max-height: 450px;
            overflow-y: auto;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .question-item {
            background: var(--bg-surface);
            border: 1px solid var(--primary-100);
            padding: var(--space-md);
            margin-bottom: var(--space-sm);
            border-radius: var(--radius-md);
            transition: box-shadow var(--transition-fast);
        }
        .question-item:hover {
            box-shadow: var(--shadow-sm);
            border-color: var(--primary-300);
        }
        .text-danger {
            color: var(--danger-text);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main role="main">
        <header class="admin-header card">
            <div>
                <h1 style="margin: 0; color: var(--primary-700);">
                    <span aria-hidden="true">👨‍🏫</span> Dashboard del Profesor
                </h1>
            </div>
            <button class="btn btn--secondary" onclick="exitAdmin()" aria-label="Salir del Panel de Profesor">
                <span class="btn-icon" aria-hidden="true">🚪</span> Salir del Panel
            </button>
        </header>

        <div class="admin-grid">
            <!-- Resultados -->
            <section class="card card-scrollable" aria-labelledby="resultados-title">
                <div class="card__header">
                    <span class="header-icon" aria-hidden="true">📊</span>
                    <h2 id="resultados-title">Resultados de Exámenes</h2>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Alumno</th>
                                <th>Nota Test</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="students-table" aria-live="polite">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Alertas de Fraude y Logs -->
            <section class="card card-scrollable" aria-labelledby="logs-title">
                <div class="card__header">
                    <span class="header-icon" aria-hidden="true">🚨</span>
                    <h2 id="logs-title">Registro de Actividad (Alertas)</h2>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Evento</th>
                                <th>Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table" aria-live="polite">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Gestión de Preguntas -->
            <section class="card full-width" aria-labelledby="preguntas-title">
                <div class="card__header">
                    <span class="header-icon" aria-hidden="true">📋</span>
                    <h2 id="preguntas-title">Gestión de Preguntas</h2>
                </div>
                
                <div class="admin-grid">
                    <div>
                        <h3 class="mb-md">Preguntas Actuales</h3>
                        <ul id="questions-list" style="list-style: none; padding: 0;" aria-live="polite">
                            <!-- Dinámico -->
                        </ul>
                    </div>

                    <div>
                        <h3 class="mb-md">Añadir Nueva Pregunta</h3>
                        <div class="card" style="background: var(--bg-base); box-shadow: none; border: 1px solid var(--primary-100);">
                            <div class="form-group">
                                <label class="form-label" for="new-q-text">Pregunta:</label>
                                <input type="text" id="new-q-text" class="form-input" placeholder="Ej. ¿Cuál es el océano más grande?">
                            </div>
                            
                            <div class="admin-grid" style="gap: var(--space-sm);">
                                <div class="form-group">
                                    <label class="form-label" for="new-q-a">Opción A:</label>
                                    <input type="text" id="new-q-a" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="new-q-b">Opción B:</label>
                                    <input type="text" id="new-q-b" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="new-q-c">Opción C:</label>
                                    <input type="text" id="new-q-c" class="form-input">
                                </div>
                            </div>

                            <div class="form-group" style="max-width: 200px;">
                                <label class="form-label" for="new-q-correct">Respuesta Correcta:</label>
                                <select id="new-q-correct" class="form-select">
                                    <option value="a">Opción A</option>
                                    <option value="b">Opción B</option>
                                    <option value="c">Opción C</option>
                                </select>
                            </div>
                            
                            <button class="btn btn--primary mt-md" onclick="addQuestion()">
                                <span class="btn-icon" aria-hidden="true">➕</span> Guardar Pregunta
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { getDBWeb, addQuestionWeb } from './firebase-web.js';

        let db = null;
        const api = window.parent.electronAPI;

        async function loadData() {
            try {
                if (api) {
                    db = await api.getDB();
                } else {
                    // Modo web: conexión directa a Firebase
                    db = await getDBWeb();
                }
                renderStudents();
                renderLogs();
                renderQuestions();
            } catch(e) {
                console.error('Error cargando datos:', e);
            }
        }

        function renderStudents() {
            const tbody = document.getElementById('students-table');
            tbody.innerHTML = '';
            if(!db.students) db.students = [];
            db.students.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${s.name}</strong></td>
                        <td><span class="badge badge--success">${s.score} pts</span></td>
                        <td>Completado</td>
                    </tr>
                `;
            });
            if(db.students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">No hay exámenes completados.</td></tr>';
            }
        }

        function renderLogs() {
            const tbody = document.getElementById('logs-table');
            tbody.innerHTML = '';
            if(!db.logs) db.logs = [];
            
            const reversedLogs = [...db.logs].reverse();
            reversedLogs.forEach(l => {
                const tipo = l.tipoEvento || l.event || ''; // Soporte para formato anterior
                const isDanger = tipo.includes('FRAUDE') || tipo.includes('FOCO_PERDIDO');
                const time = new Date(l.timestamp).toLocaleTimeString();
                
                tbody.innerHTML += `
                    <tr>
                        <td class="${isDanger ? 'text-danger' : ''}">${time}</td>
                        <td>
                            <span class="badge ${isDanger ? 'badge--danger' : 'badge--warning'}">
                                ${tipo}
                            </span>
                        </td>
                        <td class="${isDanger ? 'text-danger' : ''}">${l.detail}</td>
                    </tr>
                `;
            });
            if(db.logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">No hay registros de actividad.</td></tr>';
            }
        }

        function renderQuestions() {
            const ul = document.getElementById('questions-list');
            ul.innerHTML = '';
            if(!db.questions) db.questions = [];
            db.questions.forEach((q, index) => {
                let optionsHtml = '<em>Opciones no disponibles</em>';
                if (q.options) {
                    optionsHtml = Object.entries(q.options).map(([k, v]) => `${k.toUpperCase()}) ${v}`).join('<br>');
                }

                ul.innerHTML += `
                    <li class="question-item">
                        <div style="margin-bottom: var(--space-xs);">
                            <strong>${index + 1}. ${q.text}</strong>
                        </div>
                        <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-xs);">
                            ${optionsHtml}
                        </div>
                        <div style="font-size: var(--text-xs);">
                            <span class="badge badge--success">Correcta: ${q.correct ? q.correct.toUpperCase() : 'N/A'}</span>
                        </div>
                    </li>
                `;
            });
            if(db.questions.length === 0) {
                ul.innerHTML = '<li class="text-muted text-center py-md">No hay preguntas registradas.</li>';
            }
        }

        async function addQuestion() {
            const text = document.getElementById('new-q-text').value.trim();
            const a = document.getElementById('new-q-a').value.trim();
            const b = document.getElementById('new-q-b').value.trim();
            const c = document.getElementById('new-q-c').value.trim();
            const correct = document.getElementById('new-q-correct').value;

            if (!text || !a || !b || !c) {
                alert("⚠️ Por favor llena todos los campos de la pregunta.");
                return;
            }

            const newQ = {
                text,
                options: { a, b, c },
                correct,
                points: 5 // Valor por defecto
            };

            if (api) {
                await api.addQuestion(newQ);
            } else {
                await addQuestionWeb(newQ);
            }
            
            // Recargar datos para ver la nueva pregunta
            await loadData();
            
            // Limpiar formulario
            document.getElementById('new-q-text').value = '';
            document.getElementById('new-q-a').value = '';
            document.getElementById('new-q-b').value = '';
            document.getElementById('new-q-c').value = '';
            document.getElementById('new-q-correct').value = 'a';
            
            alert("✅ Pregunta añadida con éxito.");
        }

        function exitAdmin() {
            if (window.parent && window.parent.showExitDialog) {
                window.parent.showExitDialog();
            } else {
                alert("Modo web: cerrando sesión");
                location.reload();
            }
        }

        // Exponer funciones al scope global para botones HTML
        window.loadData = loadData;
        window.addQuestion = addQuestion;
        window.exitAdmin = exitAdmin;

        // Init
        loadData();
    </script>
</body>
</html>
