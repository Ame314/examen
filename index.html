<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Safe Exam Browser — Acceso</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <style>
        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            background: #18181b; /* Neutral dark charcoal background */
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: var(--text-inverse);
            align-items: center;
            justify-content: center;
        }

        #browser-view {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            z-index: 5;
            width: 100%;
            max-width: 460px;
            padding: var(--space-md);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl) var(--space-xl);
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: transform var(--transition-base), box-shadow var(--transition-base);
        }

        .glass-card:hover {
            box-shadow: 0 25px 60px rgba(123, 44, 191, 0.15);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .logo-container {
            font-size: 3rem;
            margin-bottom: var(--space-sm);
            background: linear-gradient(135deg, #c77dff, #e0aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        h1 {
            font-size: var(--text-2xl);
            color: #ffffff;
            font-weight: 800;
            margin-bottom: var(--space-xs);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #b5a9df;
            font-size: var(--text-base);
            margin-bottom: var(--space-xl);
        }

        .form-group-dark {
            text-align: left;
            margin-bottom: var(--space-lg);
            width: 100%;
        }

        .form-group-dark label {
            display: block;
            font-size: var(--text-sm);
            color: #cda8ff;
            margin-bottom: var(--space-xs);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-dark-container {
            position: relative;
            width: 100%;
        }

        .input-dark {
            width: 100%;
            background: rgba(20, 15, 38, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-md);
            padding: 14px var(--space-md);
            font-size: var(--text-base);
            color: #ffffff;
            transition: all var(--transition-fast);
            box-sizing: border-box;
        }

        .input-dark:focus {
            border-color: var(--primary-300);
            box-shadow: 0 0 0 3px rgba(123, 44, 191, 0.35);
            outline: none;
            background: rgba(20, 15, 38, 0.95);
        }

        .input-dark::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .error-dark {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff8585;
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            margin-top: var(--space-md);
            display: none;
            font-weight: 500;
            text-align: center;
        }

        /* Exit Dialog and Warning Modals */
        .overlay-glass {
            position: fixed;
            inset: 0;
            background: rgba(6, 4, 12, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-glass {
            background: rgba(20, 15, 38, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            text-align: center;
            color: #ffffff;
        }

        .modal-glass h2 {
            color: #ffffff;
            margin-bottom: var(--space-xs);
            font-size: var(--text-xl);
        }

        .modal-glass p {
            color: #b5a9df;
            margin-bottom: var(--space-lg);
            font-size: var(--text-sm);
        }

        /* Focus Loss Alerta */
        #alert-overlay {
            position: fixed;
            inset: 0;
            background: rgba(186, 12, 47, 0.95);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
            text-align: center;
            padding: var(--space-xl);
        }

        #alert-overlay h1 {
            font-size: 3.5rem;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: var(--space-md);
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="animate-fadeIn">
        <div class="glass-card" style="background: rgba(30, 30, 35, 0.6); border-color: rgba(255, 255, 255, 0.05);">
            <div class="logo-container" style="font-size: 2.2rem; margin-bottom: var(--space-xs); font-weight: 800; color: var(--primary-400); background: none; -webkit-text-fill-color: initial;">SEB</div>
            <h1 style="font-size: var(--text-xl); font-weight: 700; margin-bottom: var(--space-xs);">Safe Exam Browser</h1>
            <p class="subtitle" style="color: #a1a1aa; margin-bottom: var(--space-lg);">Ingresa tus credenciales para continuar</p>

            <form id="login-form">
                <div class="form-group-dark">
                    <label for="login-username" style="color: #a1a1aa;">Usuario académico</label>
                    <div class="input-dark-container">
                        <input type="text" id="login-username" class="input-dark" autocomplete="username" required placeholder="Ej: estudiante o admin" style="background: rgba(24, 24, 27, 0.6); border-color: rgba(255, 255, 255, 0.1);">
                    </div>
                </div>

                <div class="form-group-dark">
                    <label for="login-password" style="color: #a1a1aa;">Contraseña</label>
                    <div class="input-dark-container">
                        <input type="password" id="login-password" class="input-dark" autocomplete="current-password" required placeholder="••••••••" style="background: rgba(24, 24, 27, 0.6); border-color: rgba(255, 255, 255, 0.1);">
                    </div>
                </div>

                <button type="submit" id="start-btn" class="btn btn--primary btn--lg w-full mt-md" style="background: var(--primary-600); box-shadow: none;">
                    Iniciar Sesión
                </button>
            </form>

            <div id="login-error" class="error-dark" role="alert"></div>
        </div>
    </div>

    <!-- Iframe wrapper for views -->
    <iframe id="browser-view" src="" title="Contenedor de Examen y Panel"></iframe>

    <!-- Overlay de Salida (Kiosk bypass password) -->
    <div id="exit-overlay" class="overlay-glass">
        <div class="modal-glass animate-slideUp">
            <h2>Salir del Entorno Seguro</h2>
            <p>Introduce la contraseña del docente para desbloquear la aplicación:</p>
            
            <div class="form-group-dark">
                <input type="password" id="exit-password" class="input-dark" placeholder="Contraseña docente" aria-label="Contraseña de desbloqueo">
            </div>

            <div class="flex gap-md justify-center mt-lg">
                <button id="cancel-exit" class="btn btn--secondary">Cancelar</button>
                <button id="confirm-exit" class="btn btn--primary" style="background: var(--primary-600); box-shadow: none;">
                    Confirmar Salir
                </button>
            </div>
            
            <div id="exit-error" class="error-dark" role="alert">Contraseña incorrecta</div>
        </div>
    </div>

    <!-- Alerta por pérdida de foco (Intento de fraude) -->
    <div id="alert-overlay">
        <h1>¡ADVERTENCIA DE FRAUDE!</h1>
        <h2 id="alert-message" style="font-size: var(--text-2xl); font-weight: bold; max-width: 80%; line-height: 1.4;"></h2>
    </div>

    <script type="module">
        import { verifyLoginWeb } from './firebase-web.js';

        const startScreen = document.getElementById('start-screen');
        const browserView = document.getElementById('browser-view');
        const loginForm = document.getElementById('login-form');
        const loginUsername = document.getElementById('login-username');
        const loginPassword = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');
        
        const exitOverlay = document.getElementById('exit-overlay');
        const confirmExitBtn = document.getElementById('confirm-exit');
        const cancelExitBtn = document.getElementById('cancel-exit');
        const exitPassword = document.getElementById('exit-password');
        const exitError = document.getElementById('exit-error');

        const api = window.electronAPI;

        // Login Handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginError.style.display = 'none';
            
            const username = loginUsername.value.trim();
            const password = loginPassword.value;

            if (!username || !password) {
                loginError.textContent = "Por favor, ingresa tu usuario y contraseña.";
                loginError.style.display = 'block';
                return;
            }

            try {
                let user = null;
                if (api) {
                    user = await api.verifyLogin(username, password);
                } else {
                    user = await verifyLoginWeb(username, password);
                }

                if (user) {
                    // Guardar datos en sesión
                    sessionStorage.setItem('studentName', user.name);
                    sessionStorage.setItem('studentUsername', user.username);
                    sessionStorage.setItem('studentRole', user.role);

                    if (api) {
                        api.setStudentName(user.name);
                    }

                    // Redirección segura según rol
                    startScreen.style.display = 'none';
                    browserView.style.display = 'block';
                    
                    if (user.role === 'teacher') {
                        browserView.src = `admin.html?t=${Date.now()}`;
                    } else {
                        browserView.src = `dashboard.html?t=${Date.now()}`;
                    }
                } else {
                    loginError.textContent = "Credenciales incorrectas. Verifica tu usuario y contraseña.";
                    loginError.style.display = 'block';
                }
            } catch (err) {
                console.error("Error durante login:", err);
                loginError.textContent = "Error de red al conectar con el servidor.";
                loginError.style.display = 'block';
            }
        });

        // Trigger del modal de salida
        window.showExitDialog = () => {
            exitOverlay.style.display = 'flex';
            exitPassword.value = '';
            exitError.style.display = 'none';
            exitPassword.focus();
        };

        if (api) {
            api.onShowExitDialog(window.showExitDialog);
        }

        cancelExitBtn.addEventListener('click', () => {
            exitOverlay.style.display = 'none';
        });

        confirmExitBtn.addEventListener('click', async () => {
            const pwd = exitPassword.value;
            if (api) {
                const success = await api.verifyExit(pwd);
                if (!success) {
                    exitError.style.display = 'block';
                }
            } else {
                if (pwd === '1234' || pwd === 'admin') {
                    exitOverlay.style.display = 'none';
                    alert('Saliendo en modo web (recarga de simulación)');
                    location.reload();
                } else {
                    exitError.style.display = 'block';
                }
            }
        });

        exitPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmExitBtn.click();
            }
        });

        // Escucha de alertas por pérdida de foco (Electron)
        const alertOverlay = document.getElementById('alert-overlay');
        const alertMessage = document.getElementById('alert-message');
        
        if (api) {
            api.onShowAlert((message) => {
                if (message) {
                    alertMessage.textContent = message;
                    alertOverlay.style.display = 'flex';
                } else {
                    alertOverlay.style.display = 'none';
                }
            });

            api.onFraudConfirmed(() => {
                alertOverlay.style.display = 'none';
                if (browserView.contentWindow && typeof browserView.contentWindow.triggerFraudBlock === 'function') {
                    browserView.contentWindow.triggerFraudBlock();
                }
            });
        }

        // Bloqueos de seguridad globales
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('cut', e => e.preventDefault());
    </script>
</body>
</html>
