<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Profesor</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <style>
        body {
            padding: var(--space-xl);
            background-color: var(--bg-base);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl);
        }
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-lg);
        }
        .card-scrollable {
            max-height: 450px;
            overflow-y: auto;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .question-item {
            background: var(--bg-surface);
            border: 1px solid var(--primary-100);
            padding: var(--space-md);
            margin-bottom: var(--space-sm);
            border-radius: var(--radius-md);
            transition: box-shadow var(--transition-fast);
        }
        .question-item:hover {
            box-shadow: var(--shadow-sm);
            border-color: var(--primary-300);
        }
        .text-danger {
            color: var(--danger-text);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main role="main">
        <header class="admin-header card">
            <div>
                <h1 style="margin: 0; color: var(--primary-700);">
                    <span aria-hidden="true">👨‍🏫</span> Dashboard del Profesor
                </h1>
            </div>
            <button class="btn btn--secondary" onclick="exitAdmin()" aria-label="Salir del Panel de Profesor">
                <span class="btn-icon" aria-hidden="true">🚪</span> Salir del Panel
            </button>
        </header>

        <div class="admin-grid">
            <!-- Resultados -->
            <section class="card card-scrollable" aria-labelledby="resultados-title">
                <div class="card__header">
                    <span class="header-icon" aria-hidden="true">📊</span>
                    <h2 id="resultados-title">Resultados de Exámenes</h2>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Alumno</th>
                                <th>Nota Test</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="students-table" aria-live="polite">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Alertas de Fraude y Logs -->
            <section class="card card-scrollable" aria-labelledby="logs-title">
                <div class="card__header">
                    <span class="header-icon" aria-hidden="true">🚨</span>
                    <h2 id="logs-title">Registro de Actividad (Alertas)</h2>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Evento</th>
                                <th>Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table" aria-live="polite">
                            <!-- Dinámico -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Gestión de Preguntas -->
            <section class="card full-width" aria-labelledby="preguntas-title">
                <div class="card__header">
                    <span class="header-icon" aria-hidden="true">📋</span>
                    <h2 id="preguntas-title">Gestión de Preguntas</h2>
                </div>
                
                <div class="admin-grid">
                    <div>
                        <h3 class="mb-md">Preguntas Actuales</h3>
                        <ul id="questions-list" style="list-style: none; padding: 0;" aria-live="polite">
                            <!-- Dinámico -->
                        </ul>
                    </div>

                    <div>
                        <h3 class="mb-md">Añadir Nueva Pregunta</h3>
                        <div class="card" style="background: var(--bg-base); box-shadow: none; border: 1px solid var(--primary-100);">
                            <div class="form-group">
                                <label class="form-label" for="new-q-text">Pregunta:</label>
                                <input type="text" id="new-q-text" class="form-input" placeholder="Ej. ¿Cuál es el océano más grande?">
                            </div>
                            
                            <div class="admin-grid" style="gap: var(--space-sm);">
                                <div class="form-group">
                                    <label class="form-label" for="new-q-a">Opción A:</label>
                                    <input type="text" id="new-q-a" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="new-q-b">Opción B:</label>
                                    <input type="text" id="new-q-b" class="form-input">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="new-q-c">Opción C:</label>
                                    <input type="text" id="new-q-c" class="form-input">
                                </div>
                            </div>

                            <div class="form-group" style="max-width: 200px;">
                                <label class="form-label" for="new-q-correct">Respuesta Correcta:</label>
                                <select id="new-q-correct" class="form-select">
                                    <option value="a">Opción A</option>
                                    <option value="b">Opción B</option>
                                    <option value="c">Opción C</option>
                                </select>
                            </div>
                            
                            <button class="btn btn--primary mt-md" onclick="addQuestion()">
                                <span class="btn-icon" aria-hidden="true">➕</span> Guardar Pregunta
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal de Edición de Alumnos -->
    <div id="edit-modal" class="overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modal-edit-title">
        <div class="modal animate-slideUp" style="text-align: left; max-width: 500px;">
            <div class="card__header" style="margin-bottom: var(--space-md); padding-bottom: var(--space-sm);">
                <span class="header-icon" aria-hidden="true">✏️</span>
                <h2 id="modal-edit-title" style="margin: 0; font-size: var(--text-lg); color: var(--primary-700);">Editar Datos del Alumno</h2>
            </div>
            <input type="hidden" id="edit-student-id">
            
            <div class="form-group">
                <label class="form-label" for="edit-student-name">Nombre Completo:</label>
                <input type="text" id="edit-student-name" class="form-input" placeholder="Nombre del alumno">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="edit-student-score">Calificación (Puntos):</label>
                <input type="number" id="edit-student-score" class="form-input" min="0" placeholder="Puntos obtenidos">
            </div>
            
            <div class="flex gap-md mt-lg justify-center">
                <button class="btn btn--secondary" onclick="closeEditModal()" aria-label="Cancelar y cerrar diálogo">
                    Cancelar
                </button>
                <button class="btn btn--primary" onclick="saveStudentEdit()" aria-label="Guardar cambios del alumno">
                    <span class="btn-icon" aria-hidden="true">💾</span> Guardar Cambios
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Edición de Preguntas -->
    <div id="edit-question-modal" class="overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modal-edit-q-title">
        <div class="modal animate-slideUp" style="text-align: left; max-width: 550px;">
            <div class="card__header" style="margin-bottom: var(--space-md); padding-bottom: var(--space-sm);">
                <span class="header-icon" aria-hidden="true">✏️</span>
                <h2 id="modal-edit-q-title" style="margin: 0; font-size: var(--text-lg); color: var(--primary-700);">Editar Pregunta</h2>
            </div>
            <input type="hidden" id="edit-q-id">
            
            <div class="form-group">
                <label class="form-label" for="edit-q-text">Pregunta:</label>
                <input type="text" id="edit-q-text" class="form-input" placeholder="Pregunta">
            </div>
            
            <div class="admin-grid" style="gap: var(--space-sm); grid-template-columns: 1fr 1fr 1fr; margin-bottom: var(--space-md);">
                <div class="form-group">
                    <label class="form-label" for="edit-q-a">Opción A:</label>
                    <input type="text" id="edit-q-a" class="form-input" placeholder="Opción A">
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-q-b">Opción B:</label>
                    <input type="text" id="edit-q-b" class="form-input" placeholder="Opción B">
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-q-c">Opción C:</label>
                    <input type="text" id="edit-q-c" class="form-input" placeholder="Opción C">
                </div>
            </div>

            <div class="form-group" style="max-width: 250px;">
                <label class="form-label" for="edit-q-correct">Respuesta Correcta:</label>
                <select id="edit-q-correct" class="form-select">
                    <option value="a">Opción A</option>
                    <option value="b">Opción B</option>
                    <option value="c">Opción C</option>
                </select>
            </div>
            
            <div class="flex gap-md mt-lg justify-center">
                <button class="btn btn--secondary" onclick="closeEditQuestionModal()" aria-label="Cancelar y cerrar diálogo">
                    Cancelar
                </button>
                <button class="btn btn--primary" onclick="saveQuestionEdit()" aria-label="Guardar cambios de la pregunta">
                    <span class="btn-icon" aria-hidden="true">💾</span> Guardar Cambios
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { getDBWeb, addQuestionWeb, updateStudentWeb, updateQuestionWeb, deleteQuestionWeb } from './firebase-web.js';

        let db = null;
        const api = window.parent.electronAPI;

        async function loadData() {
            try {
                if (api) {
                    db = await api.getDB();
                } else {
                    // Modo web: conexión directa a Firebase
                    db = await getDBWeb();
                }
                renderStudents();
                renderLogs();
                renderQuestions();
            } catch(e) {
                console.error('Error cargando datos:', e);
            }
        }

        function renderStudents() {
            const tbody = document.getElementById('students-table');
            tbody.innerHTML = '';
            if(!db.students) db.students = [];
            db.students.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${s.name}</strong></td>
                        <td><span class="badge badge--success">${s.score} pts</span></td>
                        <td>Completado</td>
                        <td>
                            <button class="btn btn--secondary" style="padding: var(--space-xs) var(--space-sm); font-size: var(--text-xs);" onclick="openEditModal('${s.id}', '${s.name.replace(/'/g, "\\'")}', ${s.score})" aria-label="Editar alumno ${s.name}">
                                ✏️ Editar
                            </button>
                        </td>
                    </tr>
                `;
            });
            if(db.students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No hay exámenes completados.</td></tr>';
            }
        }

        function renderLogs() {
            const tbody = document.getElementById('logs-table');
            tbody.innerHTML = '';
            if(!db.logs) db.logs = [];
            
            const reversedLogs = [...db.logs].reverse();
            reversedLogs.forEach(l => {
                const tipo = l.tipoEvento || l.event || ''; // Soporte para formato anterior
                const isDanger = tipo.includes('FRAUDE') || tipo.includes('FOCO_PERDIDO');
                const time = new Date(l.timestamp).toLocaleTimeString();
                
                tbody.innerHTML += `
                    <tr>
                        <td class="${isDanger ? 'text-danger' : ''}">${time}</td>
                        <td>
                            <span class="badge ${isDanger ? 'badge--danger' : 'badge--warning'}">
                                ${tipo}
                            </span>
                        </td>
                        <td class="${isDanger ? 'text-danger' : ''}">${l.detail}</td>
                    </tr>
                `;
            });
            if(db.logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">No hay registros de actividad.</td></tr>';
            }
        }

        function renderQuestions() {
            const ul = document.getElementById('questions-list');
            ul.innerHTML = '';
            if(!db.questions) db.questions = [];
            db.questions.forEach((q, index) => {
                let optionsHtml = '<em>Opciones no disponibles</em>';
                if (q.options) {
                    optionsHtml = Object.entries(q.options).map(([k, v]) => `${k.toUpperCase()}) ${v}`).join('<br>');
                }

                const qTextEscaped = q.text.replace(/'/g, "\\'");
                const optAEscaped = q.options && q.options.a ? q.options.a.replace(/'/g, "\\'") : '';
                const optBEscaped = q.options && q.options.b ? q.options.b.replace(/'/g, "\\'") : '';
                const optCEscaped = q.options && q.options.c ? q.options.c.replace(/'/g, "\\'") : '';

                ul.innerHTML += `
                    <li class="question-item">
                        <div style="margin-bottom: var(--space-xs);">
                            <strong>${index + 1}. ${q.text}</strong>
                        </div>
                        <div style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-xs);">
                            ${optionsHtml}
                        </div>
                        <div class="flex justify-between items-center" style="font-size: var(--text-xs); margin-top: var(--space-xs);">
                            <span class="badge badge--success">Correcta: ${q.correct ? q.correct.toUpperCase() : 'N/A'}</span>
                            <div class="flex gap-sm">
                                <button class="btn btn--secondary" style="padding: 2px 6px; font-size: var(--text-xs);" onclick="openEditQuestionModal('${q.id}', '${qTextEscaped}', '${optAEscaped}', '${optBEscaped}', '${optCEscaped}', '${q.correct}')" aria-label="Editar pregunta ${index + 1}">
                                    ✏️
                                </button>
                                <button class="btn btn--danger" style="padding: 2px 6px; font-size: var(--text-xs);" onclick="deleteQuestion('${q.id}')" aria-label="Eliminar pregunta ${index + 1}">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    </li>
                `;
            });
            if(db.questions.length === 0) {
                ul.innerHTML = '<li class="text-muted text-center py-md">No hay preguntas registradas.</li>';
            }
        }

        async function addQuestion() {
            const text = document.getElementById('new-q-text').value.trim();
            const a = document.getElementById('new-q-a').value.trim();
            const b = document.getElementById('new-q-b').value.trim();
            const c = document.getElementById('new-q-c').value.trim();
            const correct = document.getElementById('new-q-correct').value;

            if (!text || !a || !b || !c) {
                alert("⚠️ Por favor llena todos los campos de la pregunta.");
                return;
            }

            const newQ = {
                text,
                options: { a, b, c },
                correct,
                points: 5 // Valor por defecto
            };

            if (api) {
                await api.addQuestion(newQ);
            } else {
                await addQuestionWeb(newQ);
            }
            
            // Recargar datos para ver la nueva pregunta
            await loadData();
            
            // Limpiar formulario
            document.getElementById('new-q-text').value = '';
            document.getElementById('new-q-a').value = '';
            document.getElementById('new-q-b').value = '';
            document.getElementById('new-q-c').value = '';
            document.getElementById('new-q-correct').value = 'a';
            
            alert("✅ Pregunta añadida con éxito.");
        }

        function openEditModal(id, name, score) {
            document.getElementById('edit-student-id').value = id;
            document.getElementById('edit-student-name').value = name;
            document.getElementById('edit-student-score').value = score;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        async function saveStudentEdit() {
            const id = document.getElementById('edit-student-id').value;
            const name = document.getElementById('edit-student-name').value.trim();
            const scoreVal = document.getElementById('edit-student-score').value;
            const score = parseInt(scoreVal, 10);

            if (!name || isNaN(score) || score < 0) {
                alert("⚠️ Por favor ingresa un nombre válido y una calificación mayor o igual a 0.");
                return;
            }

            try {
                const updatedData = { name, score };
                if (api) {
                    await api.updateStudent(id, updatedData);
                } else {
                    await updateStudentWeb(id, updatedData);
                }
                
                alert("✅ Alumno actualizado con éxito.");
                closeEditModal();
                await loadData();
            } catch(e) {
                console.error("Error al actualizar alumno:", e);
                alert("❌ Error al guardar los cambios.");
            }
        }

        function openEditQuestionModal(id, text, a, b, c, correct) {
            document.getElementById('edit-q-id').value = id;
            document.getElementById('edit-q-text').value = text;
            document.getElementById('edit-q-a').value = a;
            document.getElementById('edit-q-b').value = b;
            document.getElementById('edit-q-c').value = c;
            document.getElementById('edit-q-correct').value = correct;
            document.getElementById('edit-question-modal').style.display = 'flex';
        }

        function closeEditQuestionModal() {
            document.getElementById('edit-question-modal').style.display = 'none';
        }

        async function saveQuestionEdit() {
            const id = document.getElementById('edit-q-id').value;
            const text = document.getElementById('edit-q-text').value.trim();
            const a = document.getElementById('edit-q-a').value.trim();
            const b = document.getElementById('edit-q-b').value.trim();
            const c = document.getElementById('edit-q-c').value.trim();
            const correct = document.getElementById('edit-q-correct').value;

            if (!text || !a || !b || !c) {
                alert("⚠️ Por favor llena todos los campos de la pregunta.");
                return;
            }

            try {
                const updatedData = {
                    text,
                    options: { a, b, c },
                    correct
                };

                if (api) {
                    await api.updateQuestion(id, updatedData);
                } else {
                    await updateQuestionWeb(id, updatedData);
                }

                alert("✅ Pregunta actualizada con éxito.");
                closeEditQuestionModal();
                await loadData();
            } catch(e) {
                console.error("Error al actualizar pregunta:", e);
                alert("❌ Error al guardar los cambios.");
            }
        }

        async function deleteQuestion(id) {
            if (!confirm("⚠️ ¿Estás seguro de que deseas eliminar esta pregunta?")) {
                return;
            }

            try {
                if (api) {
                    await api.deleteQuestion(id);
                } else {
                    await deleteQuestionWeb(id);
                }

                alert("✅ Pregunta eliminada con éxito.");
                await loadData();
            } catch(e) {
                console.error("Error al eliminar pregunta:", e);
                alert("❌ Error al eliminar la pregunta.");
            }
        }

        function exitAdmin() {
            if (window.parent && window.parent.showExitDialog) {
                window.parent.showExitDialog();
            } else {
                alert("Modo web: cerrando sesión");
                location.reload();
            }
        }

        // Exponer funciones al scope global para botones HTML
        window.loadData = loadData;
        window.addQuestion = addQuestion;
        window.exitAdmin = exitAdmin;
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.saveStudentEdit = saveStudentEdit;
        window.openEditQuestionModal = openEditQuestionModal;
        window.closeEditQuestionModal = closeEditQuestionModal;
        window.saveQuestionEdit = saveQuestionEdit;
        window.deleteQuestion = deleteQuestion;

        // Init
        loadData();
    </script>
</body>
</html>
