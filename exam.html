<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen de Ejemplo</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }
        .question {
            margin-top: 30px;
        }
        .question h3 {
            margin-bottom: 15px;
        }
        .options {
            list-style-type: none;
            padding: 0;
        }
        .options li {
            margin-bottom: 10px;
        }
        label {
            cursor: pointer;
            font-size: 16px;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        .submit-btn {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Examen de Historia Básica</h1>
        <p>Por favor, responde a las siguientes preguntas. Recuerda que estás en un entorno seguro.</p>

        <form id="exam-form">
            <div class="question">
                <h3>1. ¿En qué año llegó Cristóbal Colón a América?</h3>
                <ul class="options">
                    <li><label><input type="radio" name="q1" value="a"> 1492</label></li>
                    <li><label><input type="radio" name="q1" value="b"> 1500</label></li>
                    <li><label><input type="radio" name="q1" value="c"> 1400</label></li>
                </ul>
            </div>

            <div class="question">
                <h3>2. ¿Cuál es el río más largo del mundo?</h3>
                <ul class="options">
                    <li><label><input type="radio" name="q2" value="a"> Nilo</label></li>
                    <li><label><input type="radio" name="q2" value="b"> Amazonas</label></li>
                    <li><label><input type="radio" name="q2" value="c"> Yangtsé</label></li>
                </ul>
            </div>

            <div class="question">
                <h3>3. ¿Escribe un breve ensayo sobre la Revolución Francesa? (Intenta pegar texto aquí)</h3>
                <textarea rows="5" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;"></textarea>
            </div>

            <button type="button" class="submit-btn" onclick="finishExam()">Finalizar y Salir</button>
        </form>
    </div>

    <script>
        function finishExam() {
            alert("Examen enviado con éxito.");
            if (window.parent && window.parent.showExitDialog) {
                window.parent.showExitDialog();
            }
        }
        // Bloquear copiar y pegar en este frame también
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('copy', event => event.preventDefault());
        document.addEventListener('cut', event => event.preventDefault());
        document.addEventListener('paste', event => {
            event.preventDefault();
            alert("No se permite pegar texto en este examen.");
        });
    </script>
</body>
</html>
