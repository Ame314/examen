<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen de Ejemplo</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #7b2cbf;
            border-bottom: 2px solid #7b2cbf;
            padding-bottom: 10px;
        }
        .question {
            margin-top: 30px;
        }
        .question h3 {
            margin-bottom: 15px;
        }
        .options {
            list-style-type: none;
            padding: 0;
        }
        .options li {
            margin-bottom: 10px;
        }
        label {
            cursor: pointer;
            font-size: 16px;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        .submit-btn {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #7b2cbf;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #5a189a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Examen de Historia Básica</h1>
        <p>Por favor, responde a las siguientes preguntas. Recuerda que estás en un entorno seguro.</p>

        <form id="exam-form">
            <div id="questions-container">
                <!-- Preguntas cargadas dinámicamente -->
            </div>

            <button type="button" class="submit-btn" onclick="finishExam()">Finalizar y Salir</button>
        </form>
    </div>

    <script type="module">
        import { getDBWeb, saveStudentWeb } from './firebase-web.js';

        let db = null;
        // electronAPI vive en el parent (index.html), no en el iframe
        const api = window.parent.electronAPI;
        
        // Corregido: Obtenemos el nombre por URL para evitar el problema con sessionStorage
        const urlParams = new URLSearchParams(window.location.search);
        let studentName = urlParams.get('name') || window.parent.sessionStorage?.getItem('studentName') || 'Estudiante Anónimo';

        async function loadExam() {
            if (api) {
                db = await api.getDB();
            } else {
                // Modo web: conexión directa a Firebase
                db = await getDBWeb();
            }

            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            if(!db.questions) db.questions = [];
            
            db.questions.forEach((q, index) => {
                let optionsHtml = '';
                if (q.options) {
                    for (const [key, value] of Object.entries(q.options)) {
                        optionsHtml += `<li><label><input type="radio" name="q${q.id}" value="${key}"> ${value}</label></li>`;
                    }
                } else {
                    optionsHtml = `<li><label><input type="radio" name="q${q.id}" value="a"> Verdadero</label></li>
                                   <li><label><input type="radio" name="q${q.id}" value="b"> Falso</label></li>`;
                }

                container.innerHTML += `
                <div class="question">
                    <h3>${index + 1}. ${q.text}</h3>
                    <ul class="options">
                        ${optionsHtml}
                    </ul>
                </div>
                `;
            });
            
            // Add essay
            container.innerHTML += `
            <div class="question">
                <h3>Ensayo: Escribe un breve ensayo final.</h3>
                <textarea name="essay" rows="5" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;"></textarea>
            </div>
            `;
        }

        async function finishExam() {
            const form = document.getElementById('exam-form');
            let score = 0;
            
            db.questions.forEach(q => {
                const answer = form.elements[`q${q.id}`]?.value;
                if (answer === q.correct) {
                    score += q.points;
                }
            });
            
            const essay = form.elements['essay']?.value || '';
            
            // Save to DB
            const studentData = {
                name: studentName,
                score: score,
                essay: essay,
                completedAt: new Date().toISOString()
            };
            
            if (api) {
                await api.saveStudent(studentData);
            } else {
                await saveStudentWeb(studentData);
                console.log("Modo web: estudiante guardado en Firebase", studentData);
            }

            alert(`Examen enviado con éxito.\n\nAlumno: ${studentName}\nTu calificación (opción múltiple): ${score} puntos.\n(El ensayo será calificado manualmente por el profesor).`);
            
            if (window.parent && window.parent.showExitDialog) {
                window.parent.showExitDialog();
            } else {
                alert("Modo web: el examen ha finalizado.");
            }
        }

        // Exponer función al entorno global para el botón HTML
        window.finishExam = finishExam;

        loadExam();

        // ─── Detección de Pérdida de Foco (Modo Web) ──────────────────────
        // En modo Electron esto lo maneja el proceso principal (main.js).
        // En modo web lo manejamos desde aquí.
        let blurTimeoutWeb = null;
        let examBlocked = false;

        function handleFocusLost() {
            if (examBlocked || api) return; // En Electron lo maneja main.js

            // Guardar en Firebase
            import('./firebase-web.js').then(({ addLogWeb }) => {
                addLogWeb('FOCO_PERDIDO', `[${studentName}] El alumno salió de la pantalla del examen (modo web).`);
            });

            // Mostrar alerta visual
            showWebAlert('¡ADVERTENCIA! Has salido del examen. Tienes 5 segundos para regresar o el examen se bloqueará.');

            blurTimeoutWeb = setTimeout(() => {
                import('./firebase-web.js').then(({ addLogWeb }) => {
                    addLogWeb('EXAMEN_BLOQUEADO', `[${studentName}] El examen fue bloqueado por pérdida de foco en modo web.`);
                });
                examBlocked = true;
                showWebAlert('EXAMEN BLOQUEADO. Comunícate con tu profesor para continuar.');
                // Deshabilitar el botón de finalizar para que no pueda enviar
                const btn = document.querySelector('.submit-btn');
                if (btn) btn.disabled = true;
            }, 5000);
        }

        function handleFocusRegained() {
            if (api) return;
            if (blurTimeoutWeb) {
                clearTimeout(blurTimeoutWeb);
                blurTimeoutWeb = null;
            }
            if (!examBlocked) {
                hideWebAlert();
                import('./firebase-web.js').then(({ addLogWeb }) => {
                    addLogWeb('FOCO_RECUPERADO', `[${studentName}] El alumno regresó al examen a tiempo (modo web).`);
                });
            }
        }

        // Alerta visual para modo web (no tenemos el overlay del parent)
        let alertDiv = null;
        function showWebAlert(message) {
            if (!alertDiv) {
                alertDiv = document.createElement('div');
                alertDiv.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(220, 53, 69, 0.97);
                    display: flex; flex-direction: column;
                    align-items: center; justify-content: center;
                    z-index: 99999; color: white; text-align: center; padding: 20px;
                    font-family: 'Inter', sans-serif;
                `;
                document.body.appendChild(alertDiv);
            }
            alertDiv.innerHTML = `
                <h1 style="font-size: 2.5em; margin-bottom: 20px; font-weight: bold;">¡ADVERTENCIA!</h1>
                <p style="font-size: 1.3em; max-width: 600px;">${message}</p>
            `;
            alertDiv.style.display = 'flex';
        }

        function hideWebAlert() {
            if (alertDiv) alertDiv.style.display = 'none';
        }

        // Escuchar cambio de visibilidad de pestaña (cambiar de tab en Chrome)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                handleFocusLost();
            } else {
                handleFocusRegained();
            }
        });

        // Escuchar pérdida de foco de la ventana completa
        window.addEventListener('blur', handleFocusLost);
        window.addEventListener('focus', handleFocusRegained);

        // Bloquear copiar y pegar en este frame también
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('copy', event => event.preventDefault());
        document.addEventListener('cut', event => event.preventDefault());
        document.addEventListener('paste', event => {
            event.preventDefault();
            alert("No se permite pegar texto en este examen.");
        });
    </script>
</body>
</html>
