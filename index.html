<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Safe Exam Browser</title>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #browser-view { flex-grow: 1; border: none; width: 100%; height: 100%; display: none; }
        #start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        button { padding: 15px 30px; font-size: 18px; background-color: #7b2cbf; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #5a189a; }
        
        #exit-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .exit-modal {
            background: white; padding: 30px; border-radius: 12px; text-align: center;
        }
        input[type="password"] { padding: 10px; font-size: 16px; margin: 10px 0; width: 80%; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Navegador Seguro de Exámenes</h1>
        <p>Ingresa tus datos para continuar.</p>
        <input type="text" id="login-name" placeholder="Tu Nombre y Apellido" style="padding: 10px; font-size: 16px; margin: 5px 0; width: 300px; border: 1px solid #ccc; border-radius: 4px;">
        <input type="password" id="login-password" placeholder="Contraseña de Acceso" style="padding: 10px; font-size: 16px; margin: 10px 0; width: 300px; border: 1px solid #ccc; border-radius: 4px;">
        <button id="start-btn" style="margin-top: 15px;">Entrar</button>
        <div id="login-error" class="error">Contraseña incorrecta</div>
    </div>

    <!-- We use an iframe to load the exam URL so we keep our exit overlay available -->
    <iframe id="browser-view" src=""></iframe>

    <div id="exit-overlay">
        <div class="exit-modal">
            <h2>Salir del Examen</h2>
            <p>Introduce la contraseña para salir (por defecto: 1234):</p>
            <input type="password" id="exit-password" placeholder="Contraseña">
            <br>
            <button id="confirm-exit">Salir</button>
            <button id="cancel-exit" style="background-color: #666; margin-left: 10px;">Cancelar</button>
            <div id="exit-error" class="error">Contraseña incorrecta</div>
        </div>
    </div>

    <!-- Alert Overlay for Focus Loss -->
    <div id="alert-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(220, 53, 69, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: white; text-align: center; padding: 20px;">
        <h1 style="font-size: 3em; margin-bottom: 20px; font-weight: bold;">¡ADVERTENCIA!</h1>
        <h2 id="alert-message" style="font-size: 2em; max-width: 80%;"></h2>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const browserView = document.getElementById('browser-view');
        const startBtn = document.getElementById('start-btn');
        const loginName = document.getElementById('login-name');
        const loginPassword = document.getElementById('login-password');
        const loginError = document.getElementById('login-error');
        
        const exitOverlay = document.getElementById('exit-overlay');
        const confirmExitBtn = document.getElementById('confirm-exit');
        const cancelExitBtn = document.getElementById('cancel-exit');
        const exitPassword = document.getElementById('exit-password');
        const exitError = document.getElementById('exit-error');

        // Start exam
        startBtn.addEventListener('click', () => {
            const pwd = loginPassword.value;
            const name = loginName.value.trim();

            if (pwd === '1234') {
                if (!name) {
                    loginError.textContent = "Por favor ingresa tu nombre.";
                    loginError.style.display = 'block';
                    return;
                }
                
                // Enviar nombre al proceso principal para los logs de seguridad
                if (window.electronAPI && window.electronAPI.setStudentName) {
                    window.electronAPI.setStudentName(name);
                }

                sessionStorage.setItem('studentName', name);
                startScreen.style.display = 'none';
                browserView.style.display = 'block';
                browserView.src = 'exam.html?name=' + encodeURIComponent(name) + '&t=' + Date.now();
            } else if (pwd === 'admin') {
                startScreen.style.display = 'none';
                browserView.style.display = 'block';
                browserView.src = 'admin.html?t=' + Date.now();
            } else {
                loginError.textContent = "Contraseña incorrecta";
                loginError.style.display = 'block';
            }
        });

        // Define a function to show the dialog
        window.showExitDialog = () => {
            exitOverlay.style.display = 'flex';
            exitPassword.value = '';
            exitError.style.display = 'none';
            exitPassword.focus();
        };

        // Exit dialog trigger from main process
        if (window.electronAPI) {
            window.electronAPI.onShowExitDialog(window.showExitDialog);
        }

        // Cancel exit
        cancelExitBtn.addEventListener('click', () => {
            exitOverlay.style.display = 'none';
        });

        // Confirm exit
        confirmExitBtn.addEventListener('click', async () => {
            const pwd = exitPassword.value;
            if (window.electronAPI) {
                const success = await window.electronAPI.verifyExit(pwd);
                if (!success) {
                    exitError.style.display = 'block';
                }
            } else {
                if (pwd === '1234') {
                    alert('Saliendo en modo web (simulación)');
                    exitOverlay.style.display = 'none';
                    // Aquí podrías redirigir o recargar en web
                    location.reload();
                } else {
                    exitError.style.display = 'block';
                }
            }
        });

        // Also allow pressing enter
        exitPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmExitBtn.click();
            }
        });

        // Listen for alerts from main process
        const alertOverlay = document.getElementById('alert-overlay');
        const alertMessage = document.getElementById('alert-message');
        
        if (window.electronAPI) {
            window.electronAPI.onShowAlert((message) => {
                if (message) {
                    alertMessage.textContent = message;
                    alertOverlay.style.display = 'flex';
                } else {
                    alertOverlay.style.display = 'none';
                }
            });
        }

        // Disable right click globally
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Block copy paste events in the wrapper
        document.addEventListener('copy', event => event.preventDefault());
        document.addEventListener('cut', event => event.preventDefault());
        // We might want to allow paste inside the iframe though.
    </script>
</body>
</html>
