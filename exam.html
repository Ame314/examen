<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen Seguro</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <style>
        body {
            padding: var(--space-xl);
            background-color: var(--bg-base);
            min-height: 100vh;
        }

        .exam-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .exam-header {
            margin-bottom: var(--space-xl);
        }

        .exam-header h1 {
            color: var(--primary-800);
            font-size: var(--text-3xl);
            margin-bottom: var(--space-xs);
        }

        .student-badge-bar {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-md);
            flex-wrap: wrap;
        }

        .question-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: var(--space-xl);
            margin-bottom: var(--space-xl);
            transition: border-color var(--transition-fast);
            border: 2px solid transparent;
        }

        .question-card:focus-within {
            border-color: var(--primary-200);
        }

        .question-card h3 {
            font-size: var(--text-lg);
            color: var(--text-primary);
            margin-bottom: var(--space-md);
        }

        /* Opciones interactivas */
        .option-item {
            margin-bottom: var(--space-sm);
            list-style: none;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--text-base);
            color: var(--text-primary);
            font-weight: 500;
        }

        .option-label:hover {
            border-color: rgba(139, 92, 246, 0.25);
            background: rgba(139, 92, 246, 0.04);
        }

        .option-label input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary-400);
            flex-shrink: 0;
            cursor: pointer;
        }

        /* Estilo para opción seleccionada */
        .option-label.selected {
            border-color: var(--primary-400);
            background: rgba(139, 92, 246, 0.06);
            box-shadow: 0 0 0 1px var(--primary-400);
            color: #ffffff;
        }

        .option-label.selected::after {
            content: '✓';
            margin-left: auto;
            color: var(--primary-400);
            font-weight: 700;
            font-size: var(--text-lg);
        }

        .essay-textarea {
            width: 100%;
            padding: var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: inherit;
            font-size: var(--text-base);
            resize: vertical;
            min-height: 120px;
            background: rgba(12, 8, 30, 0.5);
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }

        .essay-textarea:focus {
            border-color: var(--primary-400);
            box-shadow: var(--focus-ring);
            outline: none;
            background: rgba(12, 8, 30, 0.8);
        }
    </style>
</head>
<body>

    <div class="exam-container">
        <header class="exam-header card">
            <div class="student-badge-bar">
                <span class="badge badge--success" id="student-name-badge">Estudiante: Amelie</span>
                <span class="badge badge--info" id="exam-subject-badge">Materia: Evaluaciones</span>
                <span class="badge badge--danger" id="fraud-mode-badge">Entorno LockDown Activo</span>
            </div>
            
            <h1 id="exam-title">Cargando Examen...</h1>
            <p id="exam-description" style="color: var(--text-secondary); margin-bottom: var(--space-md);">Por favor, responde honestamente a las preguntas presentadas.</p>
            
            <div class="progress-text" id="progress-indicator">Completado: 0%</div>
            <div class="progress-bar" aria-hidden="true">
                <div class="progress-bar__fill" id="progress-bar-fill" style="width: 0%;"></div>
            </div>
        </header>

        <form id="exam-form">
            <div id="questions-container" aria-live="polite">
                <!-- Preguntas dinámicas -->
            </div>

            <div class="flex justify-between items-center mt-xl" style="padding-bottom: var(--space-2xl);">
                <button type="button" class="btn btn--secondary" onclick="abandonExam()">
                    Cancelar Examen
                </button>
                <button type="button" class="btn btn--primary btn--lg" onclick="finishExam()">
                    Finalizar y Enviar
                </button>
            </div>
        </form>
    </div>

    <script type="module">
        import { getDBWeb, saveStudentWeb, addLogWeb } from './firebase-web.js';

        let db = null;
        const api = window.parent.electronAPI;

        // Parsear parámetros de URL
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('examId');
        const studentName = urlParams.get('name') || sessionStorage.getItem('studentName') || 'Estudiante Anónimo';
        const studentUsername = sessionStorage.getItem('studentUsername') || 'estudiante';

        let exam = null;
        let examQuestions = [];

        async function initExam() {
            try {
                if (api) {
                    db = await api.getDB();
                } else {
                    db = await getDBWeb();
                }

                // VALIDACIÓN DE SEGURIDAD: Bloqueo estricto de re-ingreso
                if (!db.students) db.students = [];
                const alreadyTaken = db.students.some(s => 
                    s.examId === examId && 
                    (s.name === studentName || s.username === studentUsername)
                );

                if (alreadyTaken) {
                    alert("Seguridad SEB: Ya has completado este examen anteriormente. No está permitido rendirlo más de una vez.");
                    returnToDashboard();
                    return;
                }

                // Buscar examen
                exam = db.exams ? db.exams.find(e => e.id === examId) : null;
                if (!exam) {
                    alert("❌ Examen no encontrado en la base de datos.");
                    returnToDashboard();
                    return;
                }

                // Configurar etiquetas de encabezado
                document.getElementById('exam-title').textContent = exam.title;
                document.getElementById('exam-description').textContent = exam.description || 'Responde con cuidado. El sistema monitorea la navegación.';
                document.getElementById('student-name-badge').textContent = `Estudiante: ${studentName}`;
                document.getElementById('exam-subject-badge').textContent = `Examen ID: ${exam.id.substring(0, 8)}`;

                // Filtrar preguntas de este examen
                examQuestions = db.questions ? db.questions.filter(q => q.examId === examId) : [];

                const container = document.getElementById('questions-container');
                container.innerHTML = '';

                examQuestions.forEach((q, index) => {
                    let optionsHtml = '';
                    if (q.options) {
                        for (const [key, value] of Object.entries(q.options)) {
                            optionsHtml += `
                                <li class="option-item">
                                    <label class="option-label" id="label-q${q.id}-${key}">
                                        <input type="radio" name="q${q.id}" value="${key}" onchange="selectOption('q${q.id}', '${key}')">
                                        <span>${key.toUpperCase()}) ${value}</span>
                                    </label>
                                </li>
                            `;
                        }
                    } else {
                        // Fallback binario
                        optionsHtml = `
                            <li class="option-item">
                                <label class="option-label" id="label-q${q.id}-a">
                                    <input type="radio" name="q${q.id}" value="a" onchange="selectOption('q${q.id}', 'a')">
                                    <span>A) Verdadero</span>
                                </label>
                            </li>
                            <li class="option-item">
                                <label class="option-label" id="label-q${q.id}-b">
                                    <input type="radio" name="q${q.id}" value="b" onchange="selectOption('q${q.id}', 'b')">
                                    <span>B) Falso</span>
                                </label>
                            </li>
                        `;
                    }

                    container.innerHTML += `
                        <article class="question-card">
                            <h3>${index + 1}. ${q.text}</h3>
                            <ul class="radio-group" style="padding: 0; margin: 0;">
                                ${optionsHtml}
                            </ul>
                        </article>
                    `;
                });

                // Añadir ensayo libre
                container.innerHTML += `
                    <article class="question-card">
                        <h3>Ensayo / Respuestas de desarrollo</h3>
                        <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-sm);">Escribe tus conclusiones o responde a los requerimientos descritos en las preguntas si corresponde:</p>
                        <textarea id="essay-field" class="essay-textarea" placeholder="Escribe tu respuesta aquí..." oninput="updateProgressBar()"></textarea>
                    </article>
                `;

                updateProgressBar();

            } catch(e) {
                console.error("Error al cargar examen:", e);
                alert("❌ Error de red al iniciar el examen.");
            }
        }

        // Manejar selección visual de tarjetas de opción
        function selectOption(questionName, optionKey) {
            // Deseleccionar todas las opciones de esta pregunta
            const radios = document.getElementsByName(questionName);
            radios.forEach(radio => {
                const label = document.getElementById(`label-${questionName}-${radio.value}`);
                if (label) {
                    label.classList.remove('selected');
                }
            });

            // Seleccionar tarjeta clickeada
            const activeLabel = document.getElementById(`label-${questionName}-${optionKey}`);
            if (activeLabel) {
                activeLabel.classList.add('selected');
            }

            updateProgressBar();
        }

        // Calcular progreso del examen
        function updateProgressBar() {
            const form = document.getElementById('exam-form');
            let answered = 0;

            examQuestions.forEach(q => {
                const radios = document.getElementsByName(`q${q.id}`);
                const hasSelection = Array.from(radios).some(r => r.checked);
                if (hasSelection) answered++;
            });

            // Verificar si el ensayo tiene contenido
            const essayVal = document.getElementById('essay-field')?.value.trim();
            const totalSteps = examQuestions.length + 1;
            if (essayVal && essayVal.length > 5) answered++;

            const pct = Math.min(Math.round((answered / totalSteps) * 100), 100);
            
            document.getElementById('progress-indicator').textContent = `Completado: ${pct}%`;
            document.getElementById('progress-bar-fill').style.width = `${pct}%`;
        }

        async function finishExam() {
            const form = document.getElementById('exam-form');
            let score = 0;

            // Validar que se hayan contestado preguntas
            let missingAnswers = false;
            examQuestions.forEach(q => {
                const answer = form.elements[`q${q.id}`]?.value;
                if (!answer) {
                    missingAnswers = true;
                }
                if (answer === q.correct) {
                    score += q.points;
                }
            });

            if (missingAnswers) {
                if (!confirm("⚠️ Tienes preguntas sin responder. ¿Estás seguro de que deseas enviar el examen incompleto?")) {
                    return;
                }
            }

            const essay = document.getElementById('essay-field')?.value || '';

            const studentData = {
                name: studentName,
                username: studentUsername,
                examId: exam.id,
                examTitle: exam.title,
                score: score,
                essay: essay,
                completedAt: new Date().toISOString()
            };

            try {
                if (api) {
                    await api.saveStudent(studentData);
                    await api.addLog('EXAMEN_ENTREGADO', `[${studentName}] Entregó el examen: ${exam.title}. Calificación: ${score} pts.`);
                } else {
                    await saveStudentWeb(studentData);
                    await addLogWeb('EXAMEN_ENTREGADO', `[${studentName}] Entregó el examen: ${exam.title}. Calificación: ${score} pts. (modo web)`);
                }

                alert(`Examen enviado con éxito!\n\nEstudiante: ${studentName}\nCalificación (test): ${score} puntos.\nEl profesor revisará tu ensayo a la brevedad.`);
                returnToDashboard();

            } catch(e) {
                console.error("Error al entregar examen:", e);
                alert("Error al guardar tu calificación en el servidor.");
            }
        }

        function abandonExam() {
            if (confirm("¿Estás seguro de que deseas abandonar el examen? Los cambios actuales no se guardarán.")) {
                returnToDashboard();
            }
        }

        function returnToDashboard() {
            location.href = `dashboard.html?t=${Date.now()}`;
        }

        // Exponer al scope global para botones
        window.selectOption = selectOption;
        window.updateProgressBar = updateProgressBar;
        window.finishExam = finishExam;
        window.abandonExam = abandonExam;
        window.returnToDashboard = returnToDashboard;

        // Init
        initExam();

        // ─── Detección de Fraude en Modo Web ─────────────────────────────
        let blurTimeoutWeb = null;
        let examBlocked = false;

        function handleFocusLost() {
            if (examBlocked || api) return;

            addLogWeb('FOCO_PERDIDO', `[${studentName}] El alumno salió de la pantalla del examen (modo web) en: ${exam ? exam.title : 'Examen'}`);
            showWebAlert('¡ADVERTENCIA DE FRAUDE! Has salido del examen. Regresa en 5 segundos o el examen se bloqueará.');

            blurTimeoutWeb = setTimeout(() => {
                triggerFraudBlock();
            }, 5000);
        }

        async function triggerFraudBlock() {
            examBlocked = true;
            
            const studentData = {
                name: studentName,
                username: studentUsername,
                examId: exam.id,
                examTitle: exam.title,
                score: 0,
                essay: 'EXAMEN ANULADO AUTOMÁTICAMENTE: Intento de fraude detectado por salir de la pantalla por más de 5 segundos.',
                completedAt: new Date().toISOString()
            };

            try {
                if (api) {
                    await api.saveStudent(studentData);
                    await api.addLog('EXAMEN_ANULADO', `[${studentName}] Examen anulado por fraude: ${exam.title}. Nota: 0.`);
                } else {
                    await saveStudentWeb(studentData);
                    await addLogWeb('EXAMEN_ANULADO', `[${studentName}] Examen anulado por fraude: ${exam.title}. Nota: 0. (web)`);
                }
            } catch(e) {
                console.error("Error al registrar fraude:", e);
            }

            showBlockedScreen();
        }

        function showBlockedScreen() {
            if (blurTimeoutWeb) {
                clearTimeout(blurTimeoutWeb);
                blurTimeoutWeb = null;
            }

            // Deshabilitar todos los inputs
            const inputs = document.querySelectorAll('input, textarea, button');
            inputs.forEach(i => i.disabled = true);

            if (!alertDiv) {
                alertDiv = document.createElement('div');
                document.body.appendChild(alertDiv);
            }

            alertDiv.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(12, 8, 30, 0.98);
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                z-index: 99999; color: white; text-align: center; padding: var(--space-xl);
                font-family: 'Inter', sans-serif;
            `;

            alertDiv.innerHTML = `
                <div class="card animate-slideUp" style="max-width: 520px; width: 90%; background: #1a1430; border: 2px solid var(--danger-text); text-align: center; padding: var(--space-2xl);">
                    <h1 style="color: var(--danger-text); font-size: 2.2rem; margin-bottom: var(--space-md); font-weight: 800;">¡EXAMEN BLOQUEADO!</h1>
                    <p style="color: var(--text-primary); font-size: var(--text-base); margin-bottom: var(--space-lg); line-height: 1.5;">
                        Se ha detectado una pérdida de foco de la pantalla de evaluación por más de 5 segundos.
                    </p>
                    <div class="alert alert--danger mb-lg" style="justify-content: center; background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3);">
                        <div class="alert__content" style="flex: initial;">
                            <div class="alert__title" style="font-size: var(--text-lg); margin-bottom: 0; color: #ff8585;">
                                Calificación Registrada: <strong>0 Puntos</strong>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn--secondary btn--lg w-full justify-center" onclick="returnToDashboard()" style="opacity: 1 !important; cursor: pointer !important; background: var(--primary-600); border: none;">
                        Volver al Panel de Exámenes
                    </button>
                </div>
            `;
            alertDiv.style.display = 'flex';
        }

        function handleFocusRegained() {
            if (api) return;
            if (blurTimeoutWeb) {
                clearTimeout(blurTimeoutWeb);
                blurTimeoutWeb = null;
            }
            if (!examBlocked) {
                hideWebAlert();
                addLogWeb('FOCO_RECUPERADO', `[${studentName}] El alumno regresó al examen a tiempo (modo web).`);
            }
        }

        let alertDiv = null;
        function showWebAlert(message) {
            if (!alertDiv) {
                alertDiv = document.createElement('div');
                alertDiv.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(186, 12, 47, 0.98);
                    display: flex; flex-direction: column;
                    align-items: center; justify-content: center;
                    z-index: 99999; color: white; text-align: center; padding: var(--space-xl);
                    font-family: 'Inter', sans-serif;
                `;
                document.body.appendChild(alertDiv);
            }
            alertDiv.innerHTML = `
                <h1 style="font-size: 3rem; margin-bottom: var(--space-md); font-weight: 900;">¡ADVERTENCIA!</h1>
                <p style="font-size: 1.5rem; max-width: 650px; line-height: 1.4;">${message}</p>
            `;
            alertDiv.style.display = 'flex';
        }

        function hideWebAlert() {
            if (alertDiv) alertDiv.style.display = 'none';
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) handleFocusLost();
            else handleFocusRegained();
        });

        window.addEventListener('blur', handleFocusLost);
        window.addEventListener('focus', handleFocusRegained);

        // Bloqueo de copia y pegado
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('cut', e => e.preventDefault());
        document.addEventListener('paste', e => {
            e.preventDefault();
            alert("No se permite pegar texto en este examen seguro.");
        });
    </script>
</body>
</html>
