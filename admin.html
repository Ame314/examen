<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Profesor</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: #7b2cbf; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-height: 500px;
            overflow-y: auto;
        }
        .card h2 {
            border-bottom: 2px solid #7b2cbf;
            padding-bottom: 10px;
            color: #5a189a;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; }
        .danger { color: #dc3545; font-weight: bold; }
        button {
            background-color: #7b2cbf;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #5a189a; }
        
        /* Formularios */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dashboard del Profesor</h1>
        <button onclick="exitAdmin()">Salir del Panel</button>
    </div>

    <div class="grid">
        <!-- Resultados -->
        <div class="card">
            <h2>Resultados de Exámenes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Alumno</th>
                        <th>Nota Test</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="students-table">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>

        <!-- Alertas de Fraude y Logs -->
        <div class="card">
            <h2>Registro de Actividad (Alertas)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Evento</th>
                        <th>Detalle</th>
                    </tr>
                </thead>
                <tbody id="logs-table">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>

        <!-- Gestión de Preguntas -->
        <div class="card" style="grid-column: span 2;">
            <h2>Preguntas Actuales</h2>
            <ul id="questions-list" style="list-style-type: none; padding: 0;">
                <!-- Dinámico -->
            </ul>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <h3>Añadir Nueva Pregunta</h3>
            <div class="form-group">
                <label>Pregunta:</label>
                <input type="text" id="new-q-text">
            </div>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label>Opción A:</label>
                    <input type="text" id="new-q-a">
                </div>
                <div class="form-group">
                    <label>Opción B:</label>
                    <input type="text" id="new-q-b">
                </div>
                <div class="form-group">
                    <label>Opción C:</label>
                    <input type="text" id="new-q-c">
                </div>
            </div>
            <div class="form-group">
                <label>Respuesta Correcta (a, b o c):</label>
                <input type="text" id="new-q-correct" style="width: 50px;" maxlength="1">
            </div>
            <button onclick="addQuestion()">Guardar Pregunta</button>
        </div>
    </div>

    <script>
        let db = null;
        // electronAPI vive en el parent (index.html), no en el iframe
        const api = window.parent.electronAPI;

        async function loadData() {
            try {
                db = await api.getDB();
                renderStudents();
                renderLogs();
                renderQuestions();
            } catch(e) {
                console.error('Error cargando datos:', e);
            }
        }

        function renderStudents() {
            const tbody = document.getElementById('students-table');
            tbody.innerHTML = '';
            if(!db.students) db.students = [];
            db.students.forEach(s => {
                tbody.innerHTML += `
                    <tr>
                        <td>${s.name}</td>
                        <td>${s.score} / 10</td>
                        <td>Completado</td>
                    </tr>
                `;
            });
            if(db.students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No hay exámenes completados.</td></tr>';
            }
        }

        function renderLogs() {
            const tbody = document.getElementById('logs-table');
            tbody.innerHTML = '';
            if(!db.logs) db.logs = [];
            // Revertir para ver los más recientes arriba
            const reversedLogs = [...db.logs].reverse();
            reversedLogs.forEach(l => {
                const isDanger = l.tipoEvento.includes('FRAUDE') || l.tipoEvento.includes('FOCO_PERDIDO');
                const time = new Date(l.timestamp).toLocaleTimeString();
                tbody.innerHTML += `
                    <tr class="${isDanger ? 'danger' : ''}">
                        <td>${time}</td>
                        <td>${l.tipoEvento}</td>
                        <td>${l.detalle}</td>
                    </tr>
                `;
            });
            if(db.logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No hay registros de actividad.</td></tr>';
            }
        }

        function renderQuestions() {
            const ul = document.getElementById('questions-list');
            ul.innerHTML = '';
            if(!db.questions) db.questions = [];
            db.questions.forEach(q => {
                ul.innerHTML += `
                    <li style="background: #f8f9fa; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
                        <strong>${q.id}. ${q.text}</strong><br>
                        A) ${q.options.a} | B) ${q.options.b} | C) ${q.options.c} <br>
                        <em>Correcta: ${q.correct.toUpperCase()}</em>
                    </li>
                `;
            });
        }

        async function addQuestion() {
            const text = document.getElementById('new-q-text').value;
            const a = document.getElementById('new-q-a').value;
            const b = document.getElementById('new-q-b').value;
            const c = document.getElementById('new-q-c').value;
            const correct = document.getElementById('new-q-correct').value.toLowerCase();

            if (!text || !a || !b || !c || !correct) {
                alert("Llena todos los campos.");
                return;
            }
            if (!['a','b','c'].includes(correct)) {
                alert("La respuesta correcta debe ser a, b, o c.");
                return;
            }

            const newQ = {
                text,
                options: { a, b, c },
                correct,
                points: 5 // Default
            };

            await api.addQuestion(newQ);
            
            // Recargar datos para ver la nueva pregunta
            await loadData();
            
            // Clear form
            document.getElementById('new-q-text').value = '';
            document.getElementById('new-q-a').value = '';
            document.getElementById('new-q-b').value = '';
            document.getElementById('new-q-c').value = '';
            document.getElementById('new-q-correct').value = '';
            
            renderQuestions();
            alert("Pregunta añadida.");
        }

        function exitAdmin() {
            if (window.parent && window.parent.showExitDialog) {
                window.parent.showExitDialog();
            }
        }

        // Init
        loadData();
    </script>
</body>
</html>
